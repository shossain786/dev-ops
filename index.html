<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample UI App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>Task Tracker</h1>
      <p>Add, complete, and remove tasks with a simple UI.</p>
    </header>

    <section class="task-input-card">
      <label for="new-task">New task</label>
      <div class="input-row">
        <input id="new-task" type="text" placeholder="Enter a new task" />
        <button id="add-task-button">Add</button>
      </div>
    </section>

    <section class="task-list-card">
      <div class="task-list-header">
        <h2>Tasks</h2>
        <button id="clear-completed">Clear completed</button>
      </div>
      <ul id="task-list" class="task-list"></ul>
    </section>

    <footer class="app-footer">
      <span id="task-count">0 tasks left</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
